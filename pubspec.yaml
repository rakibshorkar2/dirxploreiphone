name: dirxploreiphone
description: "DirXplore – Advanced HTTP Directory Browser & Download Manager for iOS"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.7

  # Networking
  dio: ^5.5.0+1
  html: ^0.15.4

  # Storage
  path_provider: ^2.1.3
  shared_preferences: ^2.3.1

  # Notifications
  flutter_local_notifications: ^17.2.1+2

  # File Operations
  open_filex: ^4.4.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.0
  mime: ^1.0.6

  # Utilities
  uuid: ^4.4.2
  intl: ^0.19.0
  path: ^1.9.0
  collection: ^1.18.0

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
